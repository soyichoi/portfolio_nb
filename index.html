<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>portfolio newbalace kids</title>
    <!--swiper 필수 css cdn 연결-->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <!--swiper 필수 JS cdn 연결-->
    <script src="https://unpkg.com/swiper/swiper-bundle.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <!-- 웹글꼴 연결 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- 개별 사용자 디자인 파일 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/common.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/responsive.css">
    <script src="./scripts/common.js" defer></script>
    <script src="./scripts/index.js" defer></script>
</head>
<body>
    <div id="wrap">
        <!-- header -->
        <header>
            <!-- 띠배너 -->
            <div class="swiper notice_bnr">
                <div class="swiper-wrapper">
                    <div class="swiper-slide notice1">신규 가입 시 5,000원 할인 쿠폰 증정</div>
                    <div class="swiper-slide notice2">키즈 전상품 무료반품 혜택</div>
                    <div class="swiper-slide notice3">모바일앱 첫 결제 10% 할인</div>
                </div>
            </div>
            <!-- nav -->
            <nav>
                <h1><a href="#" class="logo"><img src="./images/common/logo.png" alt="뉴발란스 키즈"></a></h1>
                <ul class="gnb">
                    <li><a href="#">베스트</a></li>
                    <li><a href="#">의류</a></li>
                    <li><a href="#">신발</a></li>
                    <li><a href="#">용품</a></li>
                    <li><a href="#">이벤트</a></li>
                </ul>
                <div class="search_mypage">
                    <button type="button" class="search"><img src="./images/common/icon_search.svg" alt="검색"></button>
                    <button type="button" class="mypage"><img src="./images/common/icon_user.svg" alt="마이페이지"></button>
                </div>
            </nav>
        </header>
        <!-- main -->
        <main>
            <!-- 히어로 배너 -->
            <div class="swiper hero_bnr">
                <div class="swiper-wrapper">
                    <div class="swiper-slide slide1">
                        <a href="#">
                            <div class="text_box">
                                <h1>Stripe T-Shirt Styles</h1>
                                <p>3가지 다른 매력의 스트라이프 티셔츠</p>
                            </div>
                        </a>
                    </div>
                    <div class="swiper-slide slide2">
                        <a href="#">
                            <div class="text_box">
                                <h1>Colorful Spring Play</h1>
                                <p>가볍게 입고, 마음껏 뛰어노는 우리 아이들의 봄</p>
                            </div>
                        </a>
                    </div>
                    <div class="swiper-slide slide3">
                        <a href="#">
                            <div class="text_box">
                                <h1>NBSC Daily Standard</h1>
                                <p>한 단계 성장한 아이를 위한 데일리 웨어</p>
                            </div>
                        </a>
                    </div>
                </div>
                <!-- 선택요소(페이지번호, 이전다음버튼, 스크롤바) 기본삽입위치 -->
                <div class="hero-pagination swiper-pagination"></div>
                <div class="hero-prev swiper-button-prev"></div>
                <div class="hero-next swiper-button-next"></div>
            </div>
            <!-- 베스트 셀러(준비중) -->
            <div class="best"></div><!-- 미완성 레이아웃은 주석으로 (준비중) 표시해두기-->
        </main>
        <!-- footer(준비중) -->
        <footer></footer>
    </div>
</body>
</html>
